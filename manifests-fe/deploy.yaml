apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-deploy
  namespace: product1-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
        - name: fe-container
          image: public.ecr.aws/c9p7y3o2/app1-frontend-repo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
